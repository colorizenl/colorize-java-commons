name: Build
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    container: colorizenl/colorize-ci
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Unit tests
        run: gradle coverage
      - name: Translation check
        run: |
          translation_check.py resources/relative-date.properties
          translation_check.py resources/custom-swing-components.properties
      - name: Copyright header check
        run: copyright_check.py
